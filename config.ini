; MCCompatibilityChecker configuration
; - Edit values here for repo-wide defaults.
; - Use config.local.ini for machine-specific overrides (ignored by git).
;
; Notes:
; - Environment variables like %APPDATA% are supported.

[Paths]
; Active mods folder used by the launcher/game.
GameModsDir=%APPDATA%\.tlauncher\legacy\Minecraft\game\mods

; Main mods storage (the "source of truth").
; Leave empty to:
; - use GameModsDir as a fallback in Check-Mod-Compatibility.ps1
; - disable storage operations in Isolate-Incompatible-Mod.ps1
StorageModsDir=

; Optional: explicit path to tl-logger*.txt or a Fabric log file.
; Leave empty to auto-pick latest.
LogPath=

; Optional: path to Legacy Launcher executable.
; Leave empty to attach to a running launcher window.
LauncherExePath=

[Stages]
; Enables targeted Mixin conflict analysis before layering/isolation.
EnableMixinAnalysis=true

; Enables layering stage and subtractive isolation fallback.
EnableLayering=true

; Recovery is enabled by default.
; To disable it for your machine, set EnableRecovery=false in config.local.ini.
EnableRecovery=true

[Localization]
; Console language.
; Leave empty to auto-detect from OS UI locale (fallback to en).
; Supported: en, ru, es_ES, id_ID, pt_BR, tr_TR, vi, zh-CN
Language=

; Optional advanced overrides for Auto-Run-LegacyLauncher.ps1.
; Use: -Profile <name> to load values from [Profile:<name>].
[Profile:default]
; LauncherWindowTitlePattern=
; PlayButtonNames=
; PlayClickOffsetX=
; PlayClickOffsetY=
; PlayClickDelayMs=
; PlayClickMaxAttempts=
; CrashWindowTitlePatterns=
; By default patterns are auto-collected from scripts/locales/*.psd1 -> Ui.CrashWindowTitlePatterns
; Override only if your launcher title is different:
; CrashWindowTitlePatterns=Something broke, Something went wrong, Что-то сломалось...
; FabricWindowTitlePatterns=
; CrashCloseClickOffsetX=
; CrashCloseClickOffsetY=
; CrashCloseDelaySeconds=
; LauncherWindowTimeoutSeconds=
; OutcomeTimeoutSeconds=
; PollIntervalSeconds=
; SuccessGraceSeconds=
; GameProcessNames=
